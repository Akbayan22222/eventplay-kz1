<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090b17" />
  <title>Scream Race — Ведущий</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="host-page">
  <header class="topbar">
    <a class="brand-link" href="index.html">EVENTPLAY KZ</a>
    <div class="status-pill" id="networkStatus">Подключение...</div>
  </header>

  <main class="host-layout">
    <aside class="control-panel panel">
      <div>
        <span class="eyebrow">ЭКРАН ВЕДУЩЕГО</span>
        <h1>Scream Race</h1>
        <p class="muted">Создай комнату и покажи игрокам код или QR.</p>
      </div>

      <section class="room-card">
        <div>
          <span class="label">Код комнаты</span>
          <strong class="room-code" id="roomCode">------</strong>
        </div>
        <button class="icon-button" id="copyLinkButton" type="button" title="Копировать ссылку">⧉</button>
      </section>

      <div class="qr-wrap">
        <canvas id="qrCanvas" width="220" height="220"></canvas>
        <p id="joinUrl" class="tiny break-all"></p>
      </div>

      <section class="settings-block">
        <label for="finishDistance">Длина гонки: <strong id="finishDistanceValue">100</strong></label>
        <input id="finishDistance" type="range" min="60" max="180" step="10" value="100" />

        <label for="sensitivity">Чувствительность: <strong id="sensitivityValue">1.4×</strong></label>
        <input id="sensitivity" type="range" min="0.6" max="2.5" step="0.1" value="1.4" />
      </section>

      <div class="control-actions">
        <button class="button button-primary" id="startButton" type="button" disabled>Старт гонки</button>
        <button class="button button-secondary" id="resetButton" type="button">Сбросить</button>
        <button class="button button-ghost" id="demoButton" type="button">Добавить демо-игроков</button>
      </div>

      <div class="players-summary">
        <span>Игроков</span>
        <strong id="playerCount">0</strong>
      </div>
    </aside>

    <section class="race-panel panel">
      <div class="race-header">
        <div>
          <span class="eyebrow">LIVE RACE</span>
          <h2 id="raceTitle">Ожидание игроков</h2>
        </div>
        <div class="race-state" id="raceState">ЛОББИ</div>
      </div>

      <div class="countdown hidden" id="countdown">3</div>
      <div class="winner-overlay hidden" id="winnerOverlay">
        <div class="winner-card">
          <span class="winner-crown">🏆</span>
          <p>Победитель</p>
          <h2 id="winnerName">Игрок</h2>
          <button class="button button-primary" id="playAgainButton" type="button">Играть ещё</button>
        </div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🏎️</div>
        <h3>Пока никто не подключился</h3>
        <p>Игроки появятся здесь сразу после входа в комнату.</p>
      </div>

      <div class="race-tracks" id="raceTracks"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="host.js"></script>
</body>
</html>
