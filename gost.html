<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Pilot</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; padding: 40px 20px; font-family: 'Arial Black', sans-serif; }
        h1 { color: #0ff; text-transform: uppercase; }
        input { padding: 15px; width: 90%; font-size: 20px; border-radius: 8px; border: 3px solid #0ff; background: #000; color: #fff; font-weight: bold; text-align: center; text-transform: uppercase;}
        button { padding: 20px; width: 100%; margin-top: 20px; background: #ff0055; color: white; border: none; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        #log { margin-top: 20px; color: yellow; font-size: 18px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Твоя машина</h1>
        <input id="name" placeholder="ВВЕДИ ИМЯ" maxlength="10">
        <br>
        <button id="start-btn">ГОТОВ!</button>
        <div id="log"></div>
    </div>

    <script>
        const GAME_ID = 'neon-race-super-show-2026';

        document.getElementById('start-btn').onclick = async () => {
            const nameInput = document.getElementById('name').value;
            const name = nameInput ? nameInput : "ГОСТЬ";
            const logElement = document.getElementById('log');
            
            logElement.innerText = "ПОДКЛЮЧЕНИЕ...";
            const peer = new Peer(); 

            peer.on('open', () => {
                const conn = peer.connect(GAME_ID, { reliable: true }); 
                
                conn.on('open', async () => {
                    logElement.innerText = "ЗАПРАШИВАЮ МИКРОФОН...";
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        
                        setTimeout(() => {
                            conn.send({ type: 'JOIN', name: name });
                        }, 500);

                        // Ждем ответа от сервера, вдруг мест нет
                        conn.on('data', (data) => {
                            if(data.type === 'FULL') {
                                document.getElementById('ui').innerHTML = "<h1 style='color:red;'>МЕСТ НЕТ!</h1><p>В гонке уже 3 игрока.</p>";
                                stream.getTracks().forEach(track => track.stop()); // Выключаем микрофон
                            }
                        });

                        document.getElementById('ui').innerHTML = "<h1 style='color:#0ff; font-size: 40px; margin-top: 50%'>КРИЧИ!</h1><p style='color: #888;'>Гонка начнется, когда админ нажмет СТАРТ</p>";

                        const audioCtx = new AudioContext();
                        const analyser = audioCtx.createAnalyser();
                        audioCtx.createMediaStreamSource(stream).connect(analyser);
                        // Оставляем маленькое окно для быстрого реагирования на резкие крики
                        analyser.fftSize = 64; 
                        const data = new Uint8Array(analyser.frequencyBinCount);

                        setInterval(() => {
                            analyser.getByteFrequencyData(data);
                            let vol = data.reduce((a, b) => a + b) / data.length;
                            // Отправляем данные только если звук реально громкий
                            if (vol > 15) { 
                                conn.send({ type: 'MOVE', vol: vol });
                            }
                        }, 100);

                    } catch (err) {
                        logElement.innerText = "ОШИБКА: НЕТ ДОСТУПА К МИКРОФОНУ!";
                        logElement.style.color = "red";
                    }
                });
            });

            peer.on('error', err => {
                logElement.innerText = "ОШИБКА: ЭКРАН НЕ НАЙДЕН!";
                logElement.style.color = "red";
            });
        };
    </script>
</body>
</html>
