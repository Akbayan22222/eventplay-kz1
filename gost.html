<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Pilot</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #0ff; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <input id="admin-id" placeholder="ID Админа">
        <input id="player-name" placeholder="Ваше имя">
        <button onclick="connect()">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <script>
        async function connect() {
            const adminId = document.getElementById('admin-id').value;
            const name = document.getElementById('player-name').value;
            const peer = new Peer();
            const conn = peer.connect(adminId);

            conn.on('open', async () => {
                document.getElementById('ui').innerHTML = "<h1>Вы в игре! Микрофон активен</h1>";
                conn.send({ type: 'JOIN', name: name });

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                source.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                setInterval(() => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                    const volume = sum / bufferLength;
                    conn.send({ type: 'MOVE', vol: volume });
                }, 100);
            });
        }
    </script>
</body>
</html>
