<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; }
        button { padding: 15px 30px; margin-top: 20px; background: #ff0055; color: white; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <input id="name" placeholder="Атыңыз...">
    <button onclick="start()">ҚОСЫЛУ</button>

    <script>
        const ADMIN_ID = 'erdaulet_show_master_2026';
        const peer = new Peer();
        let conn;

        async function start() {
            conn = peer.connect(ADMIN_ID);
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const ctx = new AudioContext();
            const analyser = ctx.createAnalyser();
            ctx.createMediaStreamSource(stream).connect(analyser);
            analyser.fftSize = 256;

            setInterval(() => {
                let data = new Uint8Array(256);
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b) / 256;
                if(conn.open) conn.send({ type: 'MOVE', vol: vol });
            }, 100);
        }
    </script>
</body>
</html>
