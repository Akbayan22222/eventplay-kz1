<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SCREAM RACE — Экран</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0b0618;
  --void2:#1a0f35;
  --sunset1:#ff5e3a;
  --sunset2:#ff2e87;
  --neon-cyan:#22e6ff;
  --neon-purple:#a238ff;
  --gold:#ffd23f;
  --ink:#f2eefc;
  --dim:#8f7fb8;
}
*{box-sizing:border-box;}
html,body{
  margin:0;height:100%;
  background:var(--void);
  color:var(--ink);
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
}

/* ============ ФОН ЗАЛА ============ */
.void-bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(162,56,255,.25), transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(255,46,135,.18), transparent 55%),
    var(--void);
}
.grid-floor{
  position:fixed;left:0;right:0;bottom:0;height:40%;z-index:0;
  background-image:
    linear-gradient(rgba(162,56,255,.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(162,56,255,.35) 1px, transparent 1px);
  background-size:60px 40px;
  transform:perspective(300px) rotateX(60deg);
  transform-origin:bottom;
  opacity:.35;
  mask-image:linear-gradient(to top, black, transparent);
}

/* ============ ШАПКА ============ */
.top-bar{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px 6px;
}
.logo{
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  font-size:30px;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--sunset1),var(--sunset2),var(--neon-purple));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 0 40px rgba(255,46,135,.35);
}
.logo span{ color:var(--neon-cyan); -webkit-text-fill-color:var(--neon-cyan); }

.qr-panel{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(162,56,255,.4);
  padding:8px 14px;border-radius:14px;
  backdrop-filter:blur(6px);
}
.qr-panel canvas{ border-radius:8px; display:block; }
.qr-text{ font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--dim); line-height:1.5; max-width:170px; }
.qr-text b{ color:var(--neon-cyan); display:block; font-size:13px; letter-spacing:1px; }

/* ============ ОСНОВНОЙ МАКЕТ ============ */
.stage{
  position:relative;z-index:2;
  display:flex;
  height:calc(100% - 92px);
  padding:0 24px 20px;
  gap:20px;
}

/* ---------- ЛЕВАЯ ПАНЕЛЬ: ЛИДЕРБОРД ---------- */
.leaderboard{
  width:300px;flex-shrink:0;
  display:flex;flex-direction:column;
  gap:10px;
  overflow-y:auto;
  padding-right:4px;
}
.leaderboard-title{
  font-family:'Orbitron',sans-serif;
  font-size:13px;letter-spacing:3px;
  color:var(--dim);
  margin:0 0 4px 4px;
}
.player-card{
  position:relative;
  background:linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.08);
  border-left:4px solid var(--accent, var(--neon-cyan));
  border-radius:12px;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:6px;
  transition:transform .25s ease, box-shadow .25s ease;
}
.player-card.leader{
  box-shadow:0 0 22px -4px var(--accent, var(--gold));
  border-left-color:var(--gold);
}
.pc-top{ display:flex;align-items:center;justify-content:space-between; }
.pc-name-wrap{ display:flex;align-items:center;gap:8px;min-width:0; }
.pc-dot{ width:10px;height:10px;border-radius:50%;background:var(--accent,var(--neon-cyan)); box-shadow:0 0 8px var(--accent,var(--neon-cyan)); flex-shrink:0; }
.pc-name{ font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.pc-crown{ font-size:15px; }
.pc-pct{ font-family:'Share Tech Mono',monospace; font-size:15px; color:var(--accent,var(--neon-cyan)); }
.pc-brand{
  font-family:'Orbitron',sans-serif;
  font-size:9px;letter-spacing:2px;
  color:var(--dim);
  border:1px solid rgba(255,255,255,.15);
  display:inline-block;
  padding:2px 8px;border-radius:20px;
  width:fit-content;
}
.pc-bar-bg{ height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden; }
.pc-bar-fill{ height:100%;width:0%;background:linear-gradient(90deg,var(--accent,var(--neon-cyan)),#fff); transition:width .12s linear; }
.empty-hint{
  color:var(--dim);font-size:13px;text-align:center;margin-top:30px;line-height:1.6;
  font-family:'Share Tech Mono',monospace;
}

/* ---------- ПРАВАЯ ЗОНА: ТРЕК ---------- */
.race-zone{
  position:relative;
  flex:1;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(162,56,255,.35);
  background:#0d0722;
}

/* закат — фирменный элемент, разгорается от общего крика зала */
.horizon{
  position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg, #170a2e 0%, var(--sunset2) 60%, var(--sunset1) 100%);
  opacity:.55;
  transition:opacity .15s ease, filter .15s ease;
  filter:saturate(1) brightness(1);
}
.horizon::after{
  content:"";
  position:absolute;left:50%;bottom:-40px;width:220px;height:220px;
  background:radial-gradient(circle, #ffe9b8, var(--sunset1) 55%, transparent 70%);
  border-radius:50%;
  transform:translateX(-50%);
  filter:blur(2px);
}
.horizon.hype{ opacity:.95; filter:saturate(1.4) brightness(1.25); }

/* город (параллакс, слой 1 — дальний, медленный) */
.city{
  position:absolute;bottom:32%;left:0;width:200%;height:22%;
  background-repeat:repeat-x;
  background-size:contain;
  animation:scrollCity 40s linear infinite;
  opacity:.5;
}
@keyframes scrollCity{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

.lanes-wrap{
  position:absolute;bottom:0;left:0;right:0;height:62%;
  display:flex;flex-direction:column;
}
.lane{
  position:relative;
  flex:1;
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
  background:
    repeating-linear-gradient(90deg, transparent 0 70px, rgba(255,255,255,.55) 70px 100px, transparent 100px 170px);
  background-size:200% 100%;
}
.lane::before{ /* асфальт */
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(20,10,40,.0), rgba(20,10,40,.35));
  z-index:0;
}
.lane .stripe-anim{
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg, transparent 0 68px, rgba(255,255,255,.65) 68px 96px, transparent 96px 170px);
  animation:roadMove 1.1s linear infinite;
  animation-play-state:paused;
}
@keyframes roadMove{ from{ background-position-x:0; } to{ background-position-x:-170px; } }

.finish-flag{
  position:absolute;right:16px;top:0;bottom:0;width:10px;z-index:2;
  background:repeating-linear-gradient(45deg,#fff 0 8px,#111 8px 16px);
  box-shadow:0 0 12px rgba(255,255,255,.6);
}

.car{
  position:absolute;
  left:14px;top:50%;
  width:140px;height:70px;
  transform:translateY(-50%);
  z-index:3;
  transition:filter .1s;
}
.car .vibrate{ width:100%;height:100%; }
.car.moving .vibrate{ animation:vibrate .09s linear infinite; }
@keyframes vibrate{
  0%{ transform:translate(0,0); } 25%{ transform:translate(0,-1px); }
  50%{ transform:translate(0,1px); } 75%{ transform:translate(0,-1px); } 100%{ transform:translate(0,0); }
}
.wheel{ animation:spin 1s linear infinite; animation-play-state:paused; transform-origin:center; }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

.brand-badge{
  position:absolute;top:-6px;left:26px;z-index:4;
  font-family:'Orbitron',sans-serif;
  font-size:8px;letter-spacing:1.5px;
  background:rgba(10,5,20,.75);
  border:1px solid rgba(255,255,255,.3);
  padding:2px 6px;border-radius:8px;
  white-space:nowrap;
}
.name-tag{
  position:absolute;top:-6px;right:6px;z-index:4;
  font-size:11px;font-weight:700;
  background:rgba(10,5,20,.75);
  padding:2px 8px;border-radius:8px;
}

.crown{
  position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  font-size:24px;z-index:5;
  display:none;
  animation:crownFloat 1.4s ease-in-out infinite;
  filter:drop-shadow(0 0 8px var(--gold));
}
@keyframes crownFloat{ 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-6px);} }

.speed-lines{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  opacity:0;
}
.speed-lines.on{
  opacity:.5;
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.9) 0 2px, transparent 2px 40px);
  animation:speedScroll .25s linear infinite;
}
@keyframes speedScroll{ from{background-position-x:0;} to{background-position-x:-40px;} }

.turbo-flame{
  position:absolute;left:-2px;top:50%;transform:translateY(-50%);
  width:0;height:22px;z-index:2;
  background:radial-gradient(ellipse at right, #fff, var(--sunset1) 40%, transparent 70%);
  border-radius:50%;
  opacity:0;
  transition:width .12s, opacity .12s;
}
.turbo-flame.on{ width:60px; opacity:.9; }

.winner-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(6,3,15,.85);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:22px;
  text-align:center;
}
.winner-overlay h2{
  font-family:'Orbitron',sans-serif;font-size:52px;margin:0;
  background:linear-gradient(90deg,var(--gold),var(--sunset2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.winner-overlay button{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;
  padding:12px 30px;border-radius:12px;border:none;cursor:pointer;
  background:var(--neon-cyan);color:#001318;
}
</style>
</head>
<body>

<div class="void-bg"></div>
<div class="grid-floor"></div>

<div class="top-bar">
  <div class="logo">SCREAM<span>RACE</span></div>
  <div class="qr-panel">
    <canvas id="qrcode"></canvas>
    <div class="qr-text"><b>СКАНИРУЙ И КРИЧИ</b>QR-код → вводишь имя → жмёшь «Старт» → кричишь громче всех.</div>
  </div>
</div>

<div class="stage">
  <div class="leaderboard" id="leaderboard">
    <div class="leaderboard-title">// ЛИДЕРБОРД</div>
    <div class="empty-hint" id="emptyHint">Ждём игроков...<br>Отсканируйте QR-код,<br>чтобы присоединиться.</div>
  </div>

  <div class="race-zone">
    <div class="horizon" id="horizon"></div>
    <div class="city" id="city"></div>
    <div class="lanes-wrap" id="lanesWrap"></div>
  </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <h2 id="winnerTitle">🏆 ПОБЕДИЛ ИГРОК</h2>
  <button onclick="resetRace()">Новый заезд</button>
</div>

<script>
/* =========================================================
   Марки машин — только текстовые названия (без воспроизведения
   реальных логотипов брендов, чтобы не нарушать товарные знаки).
   Силуэт машины у всех один — по ТЗ "один стиль и ракурс",
   раскраска и шильдик меняются под игрока.
   ========================================================= */
/* =========================================================
   PEERJS — экран поднимает "Peer" с известным ID.
   Игроки со своих телефонов подключаются напрямую к этому ID
   (WebRTC data-канал через бесплатный сигнальный сервер PeerJS облака).
   Свой сервер и аккаунт не нужны.
   ========================================================= */
// ROOM_ID разделяет заезды: ?room=vecher1 в адресе — свой набор игроков.
// Без параметра все используют комнату "default".
const ROOM_ID = new URLSearchParams(location.search).get("room") || "default";
const SCREEN_PEER_ID = "scream_race_screen_" + ROOM_ID;

const peer = new Peer(SCREEN_PEER_ID);
const connections = {}; // conn.peer -> conn

const BRANDS = ["CHANGAN", "CHEVROLET COBALT", "TOYOTA", "LADA VESTA", "KIA RIO", "HYUNDAI SOLARIS"];
const ACCENTS = ["#22e6ff", "#ff2e87", "#ffd23f", "#7CFF6B", "#a238ff", "#ff8a3d"];

function carSvg(color){
  return `
  <svg class="vibrate" viewBox="0 0 140 70" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g filter="url(#glow)">
      <path d="M8 46 Q6 30 26 26 L46 14 Q60 8 84 10 L108 16 Q124 20 132 34 L134 46 Q134 52 128 52 L14 52 Q8 52 8 46 Z"
            fill="${color}" stroke="rgba(255,255,255,.7)" stroke-width="1.4"/>
      <path d="M50 16 Q62 11 80 13 L98 19 Q104 22 106 27 L54 27 Z" fill="rgba(10,10,20,.55)"/>
      <circle cx="34" cy="52" r="12" fill="#0c0c14" stroke="#666" stroke-width="2"/>
      <circle cx="106" cy="52" r="12" fill="#0c0c14" stroke="#666" stroke-width="2"/>
      <circle cx="34" cy="52" r="4" fill="#aaa"/>
      <circle cx="106" cy="52" r="4" fill="#aaa"/>
      <rect x="126" y="30" width="6" height="5" rx="2" fill="#fff"/>
    </g>
  </svg>`;
}

// параллакс-город (упрощённый неоновый скайлайн через SVG data-uri)
const citySvg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
    <g fill="none" stroke="#a238ff" stroke-width="1.5" opacity="0.8">
      ${Array.from({length:24}).map((_,i)=>{
        const x = i*50 + 5, h = 60 + (i*37)%110;
        return `<rect x="${x}" y="${200-h}" width="34" height="${h}" fill="rgba(24,10,50,.9)" stroke="#ff2e87" stroke-opacity="0.4"/>
                <rect x="${x+6}" y="${200-h+10}" width="6" height="6" fill="#22e6ff" opacity="0.7"/>
                <rect x="${x+20}" y="${200-h+24}" width="6" height="6" fill="#ffd23f" opacity="0.6"/>`;
      }).join("")}
    </g>
  </svg>`;
document.getElementById("city").style.backgroundImage = `url("data:image/svg+xml;base64,${btoa(citySvg)}")`;

/* =========================================================
   QR-код на player.html
   ========================================================= */
const playerUrl = ((location.origin && location.origin !== "null")
  ? location.origin + location.pathname.replace(/screen\.html$/, "") + "player.html"
  : "http://localhost:5500/player.html") + "?room=" + encodeURIComponent(ROOM_ID);
QRCode.toCanvas(document.getElementById("qrcode"), playerUrl, { width: 88, margin:1 }, ()=>{});

/* =========================================================
   Состояние игры
   ========================================================= */
const players = {}; // id -> {name, brand, accent, speed, pos, finished, volume, elLane, elCard}
let brandCursor = 0;
const FRICTION = 0.93;
const VOLUME_TO_SPEED = 15;
const MAX_SPEED = 10;
const TURBO_THRESHOLD = 0.82;
const FINISH_DISTANCE = 1; // прогресс 0..1

function assignBrand(){
  const b = BRANDS[brandCursor % BRANDS.length];
  brandCursor++;
  return b;
}

function createPlayer(id, name, brandFromPlayer){
  const accent = ACCENTS[Object.keys(players).length % ACCENTS.length];
  const brand = brandFromPlayer || assignBrand();

  players[id] = { name, brand, accent, speed:0, pos:0, volume:0, lastVolume:0, finished:false };

  // --- дорожка справа ---
  const lane = document.createElement("div");
  lane.className = "lane";
  lane.innerHTML = `
    <div class="stripe-anim"></div>
    <div class="speed-lines"></div>
    <div class="finish-flag"></div>
    <div class="car" id="car_${id}">
      <div class="crown">👑</div>
      <div class="brand-badge">${brand}</div>
      <div class="name-tag">${escapeHtml(name)}</div>
      <div class="turbo-flame"></div>
      ${carSvg(accent)}
    </div>
  `;
  document.getElementById("lanesWrap").appendChild(lane);
  players[id].elLane = lane;

  // --- карточка лидерборда ---
  document.getElementById("emptyHint").style.display = "none";
  const card = document.createElement("div");
  card.className = "player-card";
  card.style.setProperty("--accent", accent);
  card.id = "card_" + id;
  card.innerHTML = `
    <div class="pc-top">
      <div class="pc-name-wrap">
        <div class="pc-dot"></div>
        <div class="pc-name">${escapeHtml(name)}</div>
        <div class="pc-crown" style="display:none">👑</div>
      </div>
      <div class="pc-pct">0%</div>
    </div>
    <div class="pc-brand">${brand}</div>
    <div class="pc-bar-bg"><div class="pc-bar-fill"></div></div>
  `;
  document.getElementById("leaderboard").appendChild(card);
  players[id].elCard = card;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// Каждый гость со своего телефона подключается напрямую к экрану через
// WebRTC data-канал PeerJS. Экран просто слушает входящие соединения
// и сообщения — свой сервер/база данных не нужны.
peer.on("connection", (conn) => {
  connections[conn.peer] = conn;

  conn.on("data", (msg) => {
    if (!msg) return;

    if (msg.type === "join") {
      if (!players[conn.peer]) createPlayer(conn.peer, msg.name || "Игрок", msg.brand);
      return;
    }
    if (msg.type === "volume") {
      const p = players[conn.peer];
      if (p && !p.finished) p.lastVolume = msg.value;
    }
  });

  conn.on("close", () => removePlayer(conn.peer));
});

peer.on("error", (err) => console.error("PeerJS ошибка:", err));

function removePlayer(id){
  const p = players[id];
  if (!p) return;
  p.elLane.remove();
  p.elCard.remove();
  delete players[id];
  delete connections[id];
  if (Object.keys(players).length === 0) {
    document.getElementById("emptyHint").style.display = "block";
  }
}

/* =========================================================
   Игровой цикл
   ========================================================= */
function gameLoop(){
  let maxVolume = 0;
  let leaderId = null, leaderPos = -1;

  for (const id in players){
    const p = players[id];
    maxVolume = Math.max(maxVolume, p.volume);
    if (!p.finished && p.pos > leaderPos){ leaderPos = p.pos; leaderId = id; }

    if (!p.finished){
      // громкость из Firebase постоянно "толкает" машину вперёд
      p.speed = Math.min(MAX_SPEED, p.speed + (p.lastVolume || 0) * VOLUME_TO_SPEED * 0.06);
      p.pos += p.speed;
      p.speed *= FRICTION;
      if (p.speed < 0.02) p.speed = 0;
      p.volume = (p.lastVolume || 0) * 0.9 + p.volume * 0.1; // сглаживание для эффектов
      if (p.pos >= 100){ p.pos = 100; p.finished = true; announceWinner(id); }
    }

    renderPlayer(id);
  }

  // фирменный "пульс заката" от общей громкости зала
  const horizon = document.getElementById("horizon");
  if (maxVolume > 0.35) horizon.classList.add("hype"); else horizon.classList.remove("hype");

  // корона у лидера
  for (const id in players){
    const p = players[id];
    const isLeader = (id === leaderId && p.pos > 2);
    const carCrown = p.elLane.querySelector(".crown");
    const cardCrown = p.elCard.querySelector(".pc-crown");
    carCrown.style.display = isLeader ? "block" : "none";
    cardCrown.style.display = isLeader ? "inline" : "none";
    p.elCard.classList.toggle("leader", isLeader);
  }

  sortLeaderboard();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

function renderPlayer(id){
  const p = players[id];
  const laneWidth = p.elLane.clientWidth - 170;
  const car = document.getElementById("car_" + id);
  const x = 14 + (p.pos/100) * laneWidth;
  car.style.left = x + "px";

  const moving = p.speed > 0.05;
  car.classList.toggle("moving", moving);

  const stripes = p.elLane.querySelector(".stripe-anim");
  const wheels = car.querySelectorAll("circle"); // подсветка колёс не требуется, вращение — через SVG-обёртку
  if (moving){
    const dur = Math.max(0.1, 0.9 - p.speed*0.07);
    stripes.style.animationPlayState = "running";
    stripes.style.animationDuration = dur + "s";
  } else {
    stripes.style.animationPlayState = "paused";
  }

  // turbo при сильном крике
  const turbo = p.volume > (0.82) || p.speed > MAX_SPEED*0.85;
  p.elLane.querySelector(".speed-lines").classList.toggle("on", turbo);
  car.querySelector(".turbo-flame").classList.toggle("on", turbo);

  // прогресс в лидерборде
  const card = p.elCard;
  card.querySelector(".pc-pct").textContent = Math.round(p.pos) + "%";
  card.querySelector(".pc-bar-fill").style.width = p.pos + "%";
}

function sortLeaderboard(){
  const board = document.getElementById("leaderboard");
  const cards = Object.keys(players)
    .sort((a,b) => players[b].pos - players[a].pos)
    .map(id => players[id].elCard);
  cards.forEach(c => board.appendChild(c));
}

function announceWinner(id){
  const p = players[id];
  document.getElementById("winnerTitle").textContent = `🏆 ПОБЕДИЛ: ${p.name.toUpperCase()}`;
  document.getElementById("winnerOverlay").style.display = "flex";
}

function resetRace(){
  for (const id in players){
    players[id].pos = 0;
    players[id].speed = 0;
    players[id].finished = false;
  }
  document.getElementById("winnerOverlay").style.display = "none";
}
</script>
</body>
</html>
