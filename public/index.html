<!DOCTYPE html>
<html lang="kk">
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; color: white; }
        .car { 
            width: 120px; height: 60px; background: red; 
            position: absolute; left: 0; transition: left 0.1s;
            transform: scaleX(-1); /* Машинаны оңға қарату */
        }
        #p1 { top: 20%; }
        #p2 { top: 50%; }
    </style>
</head>
<body>
    <div id="game-arena">
        <div class="car" id="p1"></div>
        <div class="car" id="p2"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('move', (data) => {
            const car = document.getElementById(data.id);
            let left = parseInt(car.style.left) || 0;
            car.style.left = (left + data.vol) + "px";
        });
    </script>
</body>
</html>
