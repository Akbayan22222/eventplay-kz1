<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
    <div id="game-arena">
        <div class="car" id="p1"></div>
        <div class="car" id="p2"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('move', (data) => {
            const car = document.getElementById(data.id);
            let left = parseInt(car.style.left) || 0;
            car.style.left = (left + data.vol) + "px";
        });
    </script>
</body>
</html>
