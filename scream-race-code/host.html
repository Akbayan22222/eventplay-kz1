<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scream Race — Ведущий</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="host-page">
  <header class="topbar">
    <a href="index.html" class="logo">EVENTPLAY KZ</a>
    <div id="networkStatus" class="online-badge">Подключение...</div>
  </header>

  <main class="host-grid">
    <aside class="host-sidebar">
      <h1>Scream Race</h1>

      <div class="qr-card">
        <img id="qrImage" alt="QR-код для подключения игроков">
        <p>Сканируй QR-код</p>
      </div>

      <button id="startButton" class="main-button" type="button" disabled>Старт</button>
      <button id="resetButton" class="secondary-button" type="button">Сброс</button>
      <button id="demoButton" class="ghost-button" type="button">Демо</button>

      <div class="players-count">
        <span>Игроков</span>
        <strong id="playerCount">0</strong>
      </div>

      <div id="playerList" class="player-list"></div>
    </aside>

    <section class="race-stage">
      <div class="stage-overlay"></div>
      <div id="raceState" class="race-state">ЛОББИ</div>

      <div id="emptyState" class="empty-state">
        <strong>Ждём игроков</strong>
        <span>Покажи QR-код участникам</span>
      </div>

      <div id="raceTracks" class="race-tracks hidden"></div>

      <div id="countdown" class="countdown hidden">3</div>

      <div id="winnerOverlay" class="winner-overlay hidden">
        <div class="winner-card">
          <div class="cup">🏆</div>
          <span>Победитель</span>
          <h2 id="winnerName">Игрок</h2>
          <button id="playAgainButton" class="main-button" type="button">Играть ещё</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="host.js"></script>
</body>
</html>
