<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Scream Race — Игрок</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="player-page">
  <main class="player-shell">
    <section id="joinScreen" class="player-card">
      <span class="logo">EVENTPLAY KZ</span>
      <h1>Вход в игру</h1>
      <p>Введи имя. После подключения разреши микрофон.</p>

      <form id="joinForm">
        <label for="nameInput">Имя</label>
        <input id="nameInput" maxlength="20" autocomplete="name" placeholder="Твоё имя" required>
        <button id="joinButton" class="main-button" type="submit">Подключиться</button>
      </form>

      <div id="badLink" class="bad-link hidden">Открой эту страницу только через QR-код ведущего.</div>
    </section>

    <section id="gameScreen" class="player-card hidden">
      <div class="player-top">
        <div>
          <span class="small-label">ТВОЯ МАШИНА</span>
          <h1 id="playerNameDisplay">Игрок</h1>
          <p id="playerCarLabel">Машина</p>
        </div>
        <div id="connectionStatus" class="online-badge">Онлайн</div>
      </div>

      <div class="player-car-box">
        <img id="playerCarImage" src="assets/car-changan.png" alt="Машина игрока">
        <div class="mini-progress"><div id="miniProgress"></div></div>
        <strong id="progressText">0%</strong>
      </div>

      <div class="mic-box">
        <div id="micRing" class="mic-ring">🎤</div>
        <h2 id="instructionText">Жди старта</h2>
        <p id="micHint">Когда начнётся гонка — кричи громче.</p>
        <div class="volume-bar"><div id="volumeFill"></div></div>
      </div>

      <button id="enableMicButton" class="secondary-button hidden" type="button">Разрешить микрофон</button>
      <button id="leaveButton" class="ghost-button" type="button">Выйти</button>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="player.js"></script>
</body>
</html>
