<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Race Admin</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #0ff; font-family: 'Arial', sans-serif; overflow: hidden; }
        .track { border-bottom: 2px solid #333; height: 100px; margin: 20px 0; position: relative; }
        .car { position: absolute; left: 0; transition: left 0.1s linear; font-size: 40px; }
    </style>
</head>
<body>
    <h1>Гонка: Ожидание пилотов... (ID: <span id="peer-id">...</span>)</h1>
    <div id="track-container"></div>

    <script>
        const peer = new Peer(); // Генерирует случайный ID
        const players = {};

        peer.on('open', id => document.getElementById('peer-id').innerText = id);

        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'JOIN') {
                    players[conn.peer] = { name: data.name, pos: 0, conn };
                    createTrack(conn.peer, data.name);
                } else if (data.type === 'MOVE') {
                    updateCar(conn.peer, data.vol);
                }
            });
            conn.on('close', () => removeCar(conn.peer));
        });

        function createTrack(id, name) {
            const container = document.getElementById('track-container');
            const div = document.createElement('div');
            div.id = 'track-' + id;
            div.className = 'track';
            div.innerHTML = `<div class="car" id="car-${id}">🏎️ ${name}</div>`;
            container.appendChild(div);
        }

        function updateCar(id, vol) {
            const car = document.getElementById(`car-${id}`);
            if (car) {
                players[id].pos += vol * 5; // Множитель скорости
                car.style.left = players[id].pos + 'px';
            }
        }

        function removeCar(id) {
            const el = document.getElementById('track-' + id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
