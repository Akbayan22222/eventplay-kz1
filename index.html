<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Event Racing Game</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; }
        
        /* СОЛ ЖАҚ: ТАБЛО */
        #scoreboard { width: 300px; background: #111; padding: 20px; border-right: 2px solid #333; }
        .player-row { display: flex; align-items: center; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 5px; }
        .indicator { width: 15px; height: 15px; border-radius: 50%; margin-right: 10px; }

        /* ОҢ ЖАҚ: ГОНОЧНАЯ ЗОНА */
        #race-zone { flex-grow: 1; position: relative; background: linear-gradient(to bottom, #1a1a2e, #0f0f1a); overflow: hidden; }
        .car { width: 120px; height: 60px; position: absolute; left: 50px; transition: 0.1s; transform: scaleX(-1); background-size: contain; background-repeat: no-repeat; }
        
        /* ПАРАЛЛАКС ФОНЫ */
        .road-line { position: absolute; bottom: 30%; width: 100%; height: 5px; background: white; animation: moveRoad 1s linear infinite; }
        @keyframes moveRoad { from { left: 100%; } to { left: -100%; } }
    </style>
</head>
<body>

    <div id="scoreboard">
        <h2>Ойыншылар</h2>
        <div class="player-row">
            <div class="indicator" style="background: red;"></div>
            <span>Акбаян: <b id="p1-score">0%</b></span>
        </div>
    </div>

    <div id="race-zone">
        <div class="road-line"></div>
        <div id="car1" class="car" style="top: 20%; background-image: url('https://cdn-icons-png.flaticon.com/512/744/744465.png');"></div>
    </div>

    <script>
        // Бұл жерде Socket.io немесе Firebase арқылы деректерді қабылдайсың
        // Әзірге микрофонды тестілеу үшін логика:
        async function startMic() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const ctx = new AudioContext();
            const analyser = ctx.createAnalyser();
            ctx.createMediaStreamSource(stream).connect(analyser);
            analyser.fftSize = 256;
            
            function update() {
                let data = new Uint8Array(256);
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b) / 256;
                
                let car = document.getElementById('car1');
                let pos = parseInt(car.style.left) || 50;
                if(vol > 10) car.style.left = (pos + vol/2) + "px";
                
                document.getElementById('p1-score').innerText = Math.floor(pos/10) + "%";
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
    <button onclick="startMic()" style="position:fixed; bottom:20px; right:20px; padding:15px; z-index:99;">Микрофонды қосу</button>
</body>
</html>
