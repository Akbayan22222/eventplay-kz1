<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Race Admin</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        #header { text-align: center; padding: 20px; background: #111; border-bottom: 2px solid #0ff; }
        
        .track { 
            height: 140px; border-bottom: 1px dashed #333; position: relative; 
            display: flex; align-items: center; margin-bottom: 10px;
        }
        
        .info-panel { width: 250px; padding-left: 20px; z-index: 5; }
        .player-name { font-size: 22px; text-transform: uppercase; }
        .bar-container { width: 200px; height: 10px; background: #333; margin-top: 5px; border-radius: 5px; }
        .bar-fill { height: 100%; width: 0%; background: #0ff; transition: width 0.1s; }
        
        /* ИСПРАВЛЕНИЕ: Машина едет плавно через видеокарту (transform), гифка не прерывается */
        .car-gif { 
            position: absolute; 
            left: 270px; /* Старт строго за панелью */
            width: 220px; 
            transition: transform 0.1s linear; 
            will-change: transform;
        }

        #winner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; z-index: 999; }
        #winner h1 { font-size: 60px; color: #0ff; text-transform: uppercase; text-shadow: 0 0 20px #0ff;}
        button { padding: 15px 30px; font-size: 20px; background: #ff0055; color: #fff; border: none; cursor: pointer; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <button id="start-btn">СТАРТ ГОНКИ</button>
        <div id="status" style="margin-top: 10px; color: #0ff; font-size: 18px;">ОЖИДАНИЕ ПИЛОТОВ...</div>
    </div>
    <div id="track-container"></div>
    <div id="winner">
        <h1 id="winner-name">ПОБЕДИТЕЛЬ!</h1>
        <button onclick="location.reload()">НОВАЯ ГОНКА</button>
    </div>

    <script>
        const peer = new Peer('neon-race-super-show-2026');
        let gameStarted = false;
        const players = {};
        
        const carGifs = [
            "https://i.ibb.co.com/ZpJdCZvb/1.gif",
            "https://i.ibb.co.com/35wcqwNR/2.gif",
            "https://i.ibb.co.com/fYq4vM9M/3.gif"
        ];

        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'JOIN') {
                    const container = document.getElementById('track-container');
                    const index = Object.keys(players).length;
                    
                    if (index >= 3) return; // Максимум 3 игрока

                    // Записываем начальную позицию 0 (относительно стартовой точки)
                    players[conn.peer] = { pos: 0, name: data.name };

                    // ИСПРАВЛЕНИЕ: Правильное создание элементов без сброса гифок
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.id = `track-${conn.peer}`;
                    trackDiv.innerHTML = `
                        <div class="info-panel">
                            <div class="player-name">${data.name} <span id="speed-${conn.peer}" style="color:#0ff; float:right;">0 км/ч</span></div>
                            <div class="bar-container"><div class="bar-fill" id="bar-${conn.peer}"></div></div>
                        </div>
                        <img src="${carGifs[index % 3]}" class="car-gif" id="car-${conn.peer}">
                    `;
                    container.appendChild(trackDiv);

                } else if (data.type === 'MOVE' && gameStarted) {
                    const car = document.getElementById(`car-${conn.peer}`);
                    if (car && players[conn.peer]) {
                        
                        if (data.vol > 30) {
                            players[conn.peer].pos += (data.vol - 30) * 0.18; // Скорость
                            // Двигаем через GPU, гифка работает
                            car.style.transform = `translateX(${players[conn.peer].pos}px)`;
                            document.getElementById(`speed-${conn.peer}`).innerText = Math.floor(data.vol * 1.3) + ' км/ч';
                            
                            // Проверка финиша
                            if (players[conn.peer].pos > window.innerWidth - 450) {
                                document.getElementById('winner-name').innerText = "ПОБЕДИТЕЛЬ: " + players[conn.peer].name;
                                document.getElementById('winner').style.display = 'flex';
                                gameStarted = false;
                            }
                        } else {
                            document.getElementById(`speed-${conn.peer}`).innerText = '0 км/ч';
                        }
                        
                        document.getElementById(`bar-${conn.peer}`).style.width = Math.min(100, (data.vol / 150) * 100) + '%';
                    }
                }
            });
            
            conn.on('close', () => {
                const track = document.getElementById(`track-${conn.peer}`);
                if (track) track.remove();
                delete players[conn.peer];
            });
        });

        document.getElementById('start-btn').onclick = () => {
            gameStarted = true;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').innerText = "ГОНКА НАЧАЛАСЬ! КРИЧИТЕ!";
            document.getElementById('status').style.color = "#ff0055";
        };
    </script>
</body>
</html>
