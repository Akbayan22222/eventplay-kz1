<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Race Event Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <h1>Ойынды бастау үшін QR-ды сканерлеңіз</h1>
        <div id="qr-placeholder">QR КОД ОРНЫ</div>
        <button id="start-game">Ойынды бастау</button>
    </div>

    <div id="game-arena" style="display: none;">
        <div class="sky-layer"></div>
        <div class="road-layer"></div>
        <div id="cars-container">
            <div class="car" id="p1" style="bottom: 20%;"></div>
            <div class="car" id="p2" style="bottom: 50%;"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
