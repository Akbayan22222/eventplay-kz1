<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Race Admin</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #0ff; font-family: sans-serif; overflow: hidden; }
        .track { border-bottom: 2px solid #333; height: 100px; display: flex; align-items: center; margin: 10px 0; }
        .car { font-size: 40px; margin-left: 0px; transition: margin-left 0.1s linear; }
        #status { font-size: 24px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="status" style="color: yellow;">Запуск сервера... Ожидайте</div>
    <div id="track-container"></div>

    <script>
        // Изменил ID на более сложный, чтобы избежать конфликтов на публичном сервере
        const GAME_ID = 'neon-race-super-show-2026'; 
        const peer = new Peer(GAME_ID);
        const players = {};

        peer.on('open', (id) => {
            document.getElementById('status').innerText = `Готов! Ожидаем пилотов...`;
            document.getElementById('status').style.color = "#0ff";
        });

        peer.on('error', (err) => {
            document.getElementById('status').innerText = `Ошибка: ID занят или сеть недоступна (${err.type}). Перезагрузите страницу!`;
            document.getElementById('status').style.color = "red";
        });

        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'JOIN') {
                    // Правильно создаем машину, не перезаписывая остальных
                    players[conn.peer] = { name: data.name, pos: 0 };
                    
                    const container = document.getElementById('track-container');
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.id = `track-${conn.peer}`;
                    trackDiv.innerHTML = `<div class="car" id="car-${conn.peer}">🏎️ ${data.name}</div>`;
                    container.appendChild(trackDiv);
                    
                } else if (data.type === 'MOVE') {
                    const car = document.getElementById(`car-${conn.peer}`);
                    if (car && players[conn.peer]) {
                        players[conn.peer].pos += data.vol * 1.5;
                        car.style.marginLeft = players[conn.peer].pos + 'px';
                    }
                }
            });

            conn.on('close', () => {
                const track = document.getElementById(`track-${conn.peer}`);
                if (track) track.remove();
                delete players[conn.peer];
            });
        });
    </script>
</body>
</html>
