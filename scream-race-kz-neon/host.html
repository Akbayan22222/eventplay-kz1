<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#090b18">
  <title>Scream Race — Ведущий</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="host-page">
  <header class="topbar">
    <a class="brand brand-top" href="index.html">
      <span class="brand-mark">⚡</span>
      <span>EVENTPLAY KZ</span>
    </a>
    <div id="networkStatus" class="online-badge">Подключение...</div>
  </header>

  <main class="host-shell">
    <aside class="sidebar glass-panel">
      <div class="sidebar-head">
        <div class="brand sidebar-brand">
          <span class="brand-mark">⚡</span>
          <span>EVENTPLAY KZ</span>
        </div>
      </div>

      <section class="qr-card neon-card">
        <div class="qr-frame">
          <img id="qrImage" class="qr-image" alt="QR-код для подключения игроков">
        </div>
        <div class="qr-caption">Сканируй QR</div>
      </section>

      <div class="sidebar-actions">
        <button id="startButton" class="action-btn action-start" type="button" disabled>
          <span class="action-icon">▶</span>
          <span>Старт</span>
        </button>
        <button id="resetButton" class="action-btn" type="button">
          <span class="action-icon">↻</span>
          <span>Сброс</span>
        </button>
        <button id="demoButton" class="action-btn action-ghost" type="button">
          <span class="action-icon">◫</span>
          <span>Демо</span>
        </button>
      </div>

      <div class="players-online neon-card compact-card">
        <div class="players-online-row">
          <span>Игроков онлайн</span>
          <strong id="playerCount">0</strong>
        </div>
      </div>

      <section class="players-card neon-card">
        <div class="players-card-title">Игроки</div>
        <div id="playerList" class="player-list"></div>
      </section>
    </aside>

    <section class="race-stage glass-panel">
      <div class="sky-banner">
        <div class="sun-disc"></div>
        <div class="skyline skyline-back"></div>
        <div class="skyline skyline-front"></div>
      </div>

      <div class="race-stage-top">
        <div id="raceState" class="race-state">ЛОББИ</div>
      </div>

      <div id="emptyState" class="empty-state">
        <strong>Подключи игроков по QR-коду</strong>
      </div>

      <div id="raceTracks" class="race-tracks hidden"></div>

      <div id="countdown" class="countdown hidden">3</div>

      <div id="winnerOverlay" class="winner-overlay hidden">
        <div class="winner-card">
          <div class="cup">🏆</div>
          <span>Победитель</span>
          <h2 id="winnerName">Игрок</h2>
          <button id="playAgainButton" class="action-btn action-start" type="button">
            <span class="action-icon">▶</span>
            <span>Играть ещё</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="host.js"></script>
</body>
</html>
