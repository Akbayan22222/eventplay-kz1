<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c17">
  <title>Scream Race — Ведущий</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="host-page">
  <header class="topbar">
    <a class="brand" href="index.html">EVENTPLAY KZ</a>
    <div id="networkStatus" class="online-badge">Подключение...</div>
  </header>

  <main class="host-grid">
    <aside class="sidebar panel">
      <h1>Экран ведущего</h1>

      <div class="qr-card">
        <canvas id="qrCanvas" width="260" height="260"></canvas>
        <div class="qr-caption">Сканируй QR → введи имя → разреши микрофон</div>
      </div>

      <div class="sidebar-actions">
        <button id="startButton" class="btn btn-primary" type="button" disabled>Старт</button>
        <button id="resetButton" class="btn btn-secondary" type="button">Сброс</button>
        <button id="demoButton" class="btn btn-ghost" type="button">Демо</button>
      </div>

      <div class="players-box">
        <div class="players-head">
          <span>Игроков</span>
          <strong id="playerCount">0</strong>
        </div>
        <div id="playerList" class="player-list"></div>
      </div>
    </aside>

    <section class="stage panel">
      <div class="stage-sky">
        <div class="sun-glow"></div>
        <div class="skyline skyline-back"></div>
        <div class="skyline skyline-front"></div>
      </div>

      <div class="stage-topline">
        <div id="raceState" class="race-state">ЛОББИ</div>
      </div>

      <div id="emptyState" class="empty-state">
        <strong>Подключи игроков по QR-коду</strong>
      </div>

      <div id="raceTracks" class="race-tracks hidden"></div>

      <div id="countdown" class="countdown hidden">3</div>

      <div id="winnerOverlay" class="winner-overlay hidden">
        <div class="winner-card">
          <div class="cup">🏆</div>
          <span>Победитель</span>
          <h2 id="winnerName">Игрок</h2>
          <button id="playAgainButton" class="btn btn-primary" type="button">Играть ещё</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="host.js"></script>
</body>
</html>
